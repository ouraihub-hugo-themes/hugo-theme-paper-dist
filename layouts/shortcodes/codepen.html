{{- /* CodePen embed: {{< codepen user pen_id >}} or {{< codepen user pen_id "css,result" >}} */ -}}
{{- $user := .Get 0 -}}
{{- $pen := .Get 1 -}}
{{- $tabs := .Get 2 | default "result" -}}
<div class="my-6 overflow-hidden rounded-lg border border-border">
  <iframe
    height="400"
    src="https://codepen.io/{{ $user }}/embed/{{ $pen }}?default-tab={{ $tabs }}&theme-id=dark"
    title="CodePen"
    allowfullscreen
    loading="lazy"
    class="w-full"
  ></iframe>
</div>

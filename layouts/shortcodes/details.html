{{- /* Collapsible: {{< details "Click to expand" >}}Hidden content{{< /details >}} */ -}}
{{- $summary := .Get 0 | default "Details" -}}
<details class="my-6 rounded-lg border border-border p-4 open:pb-4">
  <summary class="cursor-pointer font-medium">{{ $summary }}</summary>
  <div class="mt-3 text-foreground">{{ .Inner | markdownify }}</div>
</details>
